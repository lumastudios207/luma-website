  <!-- Editor chrome -->
  <rect x="30" y="24" width="520" height="34" rx="8" fill="rgba(255,255,255,0.05)"/>
  <rect x="30" y="46" width="520" height="12" fill="rgba(255,255,255,0.05)"/>
  <circle cx="52" cy="41" r="5" fill="rgba(255,90,90,0.5)"/>
  <circle cx="70" cy="41" r="5" fill="rgba(255,200,50,0.5)"/>
  <circle cx="88" cy="41" r="5" fill="rgba(80,200,80,0.5)"/>
  <!-- File tabs -->
  <rect x="108" y="32" width="80" height="20" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="196" y="32" width="70" height="20" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="274" y="32" width="70" height="20" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="116" y="37" width="50" height="8" rx="2" fill="rgba(255,252,16,0.3)"/>
  <rect x="204" y="38" width="45" height="7" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="282" y="38" width="45" height="7" rx="2" fill="rgba(255,255,255,0.15)"/>

  <!-- Line numbers gutter -->
  <rect x="30" y="58" width="44" height="318" fill="rgba(255,255,255,0.02)"/>

  <!-- Line numbers -->
