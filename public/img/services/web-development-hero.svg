  <text x="44" y="98" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">2</text>
  <text x="44" y="116" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">3</text>
  <text x="44" y="134" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">4</text>
  <text x="44" y="152" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">5</text>
  <text x="44" y="170" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">6</text>
  <text x="44" y="188" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">7</text>
  <text x="44" y="206" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">8</text>
  <text x="44" y="224" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">9</text>
  <text x="44" y="242" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">10</text>
  <text x="44" y="260" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">11</text>
  <text x="44" y="278" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">12</text>
  <text x="44" y="296" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">13</text>
  <text x="44" y="314" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">14</text>
  <text x="44" y="332" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">15</text>

  <!-- Active line highlight -->
  <rect x="74" y="124" width="462" height="18" fill="rgba(255,252,16,0.04)"/>

  <!-- Code lines - keyword, string, punctuation colors -->
  <!-- Line 1 -->
  <rect x="82" y="72" width="50" height="8" rx="2" fill="rgba(167,139,250,0.7)"/>
  <rect x="140" y="72" width="70" height="8" rx="2" fill="rgba(79,195,247,0.7)"/>
  <rect x="218" y="72" width="8" height="8" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Line 2 indent -->
  <rect x="102" y="90" width="60" height="8" rx="2" fill="rgba(255,252,16,0.5)"/>
  <rect x="170" y="90" width="8" height="8" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="186" y="90" width="90" height="8" rx="2" fill="rgba(134,239,172,0.6)"/>
  <rect x="284" y="90" width="8" height="8" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Line 3 indent -->
  <rect x="102" y="108" width="50" height="8" rx="2" fill="rgba(255,252,16,0.5)"/>
  <rect x="160" y="108" width="8" height="8" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="176" y="108" width="110" height="8" rx="2" fill="rgba(134,239,172,0.6)"/>
  <rect x="294" y="108" width="8" height="8" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Line 4 (highlighted) indent -->
  <rect x="102" y="128" width="40" height="8" rx="2" fill="rgba(167,139,250,0.7)"/>
  <rect x="150" y="128" width="8" height="8" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="166" y="128" width="130" height="8" rx="2" fill="rgba(255,252,16,0.6)"/>
  <rect x="304" y="128" width="8" height="8" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Line 5 -->
  <rect x="102" y="146" width="60" height="8" rx="2" fill="rgba(255,252,16,0.5)"/>
  <rect x="170" y="146" width="8" height="8" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="186" y="146" width="80" height="8" rx="2" fill="rgba(134,239,172,0.6)"/>

  <!-- Line 6 -->
  <rect x="82" y="164" width="8" height="8" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Line 7 blank -->

  <!-- Line 8 -->
  <rect x="82" y="200" width="70" height="8" rx="2" fill="rgba(167,139,250,0.7)"/>
  <rect x="160" y="200" width="50" height="8" rx="2" fill="rgba(79,195,247,0.6)"/>
  <rect x="218" y="200" width="8" height="8" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="234" y="200" width="100" height="8" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="342" y="200" width="8" height="8" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Line 9 -->
  <rect x="102" y="218" width="40" height="8" rx="2" fill="rgba(255,252,16,0.4)"/>
  <rect x="150" y="218" width="8" height="8" rx="1" fill="rgba(255,255,255,0.2)"/>
  <rect x="166" y="218" width="180" height="8" rx="2" fill="rgba(255,255,255,0.08)"/>

  <!-- Line 10 -->
  <rect x="102" y="236" width="40" height="8" rx="2" fill="rgba(255,252,16,0.4)"/>
  <rect x="150" y="236" width="8" height="8" rx="1" fill="rgba(255,255,255,0.2)"/>
  <rect x="166" y="236" width="140" height="8" rx="2" fill="rgba(255,255,255,0.08)"/>

  <!-- Line 11 -->
  <rect x="82" y="254" width="8" height="8" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Lines 12-15 fade out -->
  <rect x="82" y="272" width="200" height="7" rx="2" fill="rgba(255,255,255,0.04)"/>
  <rect x="102" y="290" width="160" height="7" rx="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="102" y="308" width="180" height="7" rx="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="82" y="326" width="8" height="7" rx="1" fill="rgba(255,255,255,0.04)"/>

  <!-- Cursor blink -->
  <rect x="82" y="344" width="2" height="14" rx="1" fill="rgba(255,252,16,0.8)"/>

  <!-- Fade overlay at bottom -->
  <rect x="30" y="310" width="520" height="64" rx="0" fill="url(#fade)"/>
  <defs>
    <linearGradient id="fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:#0f1117;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
</svg>
