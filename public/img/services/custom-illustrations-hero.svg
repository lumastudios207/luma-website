  <circle cx="420" cy="117" r="5" fill="rgba(79,195,247,0.4)"/>
  <rect x="430" y="114" width="60" height="6" rx="2" fill="rgba(255,255,255,0.08)"/>

  <rect x="408" y="134" width="112" height="22" rx="3" fill="rgba(255,252,16,0.1)" stroke="rgba(255,252,16,0.2)" stroke-width="1"/>
  <ellipse cx="420" cy="145" rx="6" ry="4" fill="rgba(255,252,16,0.5)"/>
  <rect x="430" y="142" width="54" height="6" rx="2" fill="rgba(255,252,16,0.3)"/>

  <rect x="408" y="162" width="112" height="22" rx="3" fill="rgba(255,255,255,0.03)"/>
  <rect x="414" y="168" width="10" height="10" rx="1" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="430" y="170" width="64" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>

  <rect x="408" y="190" width="112" height="22" rx="3" fill="rgba(255,255,255,0.03)"/>
  <line x1="414" y1="201" x2="424" y2="201" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  <rect x="430" y="198" width="54" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>

  <rect x="408" y="218" width="112" height="22" rx="3" fill="rgba(255,255,255,0.03)"/>
  <rect x="430" y="226" width="44" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>

