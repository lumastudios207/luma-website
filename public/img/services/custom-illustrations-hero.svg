  <circle cx="320" cy="270" r="7" fill="rgba(79,195,247,0.3)"/>
  <!-- Line strokes -->
  <path d="M 130 180 Q 180 130 240 160 Q 300 190 340 150" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 110 260 Q 160 230 220 250 Q 280 270 330 240" fill="none" stroke="rgba(255,252,16,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
