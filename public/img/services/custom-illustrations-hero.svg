  <rect x="88" y="46" width="304" height="278" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Illustration elements on canvas -->
  <!-- Abstract shape 1 - yellow circle -->
  <circle cx="190" cy="150" r="55" fill="rgba(255,252,16,0.1)" stroke="rgba(255,252,16,0.25)" stroke-width="1.5"/>
  <circle cx="190" cy="150" r="36" fill="rgba(255,252,16,0.07)"/>
