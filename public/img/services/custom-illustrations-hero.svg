<svg width="580" height="400" viewBox="0 0 580 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#161920"/>
    </linearGradient>
  </defs>

  <rect width="580" height="400" fill="url(#bg)" rx="6"/>

  <!-- Multi-color glow -->
  <circle cx="160" cy="180" r="140" fill="rgba(255,252,16,0.04)"/>
