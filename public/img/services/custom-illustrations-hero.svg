  <rect x="40" y="30" width="500" height="310" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Toolbar left -->
  <rect x="40" y="30" width="36" height="310" rx="6" fill="rgba(255,255,255,0.04)"/>
  <rect x="40" y="36" width="36" height="304" rx="0" fill="rgba(255,255,255,0.03)"/>
  <circle cx="58" cy="58" r="8" fill="rgba(255,252,16,0.2)" stroke="rgba(255,252,16,0.4)" stroke-width="1.5"/>
  <rect x="50" y="76" width="16" height="16" rx="2" fill="rgba(255,255,255,0.08)"/>
  <circle cx="58" cy="106" r="7" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <line x1="50" y1="124" x2="66" y2="140" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-linecap="round"/>
