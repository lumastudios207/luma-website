  <rect x="416" y="300" width="14" height="10" rx="2" fill="#FFFC10"/>
  <rect x="434" y="300" width="14" height="10" rx="2" fill="#A78BFA"/>
  <rect x="452" y="300" width="14" height="10" rx="2" fill="#4FC3F7"/>
  <rect x="470" y="300" width="14" height="10" rx="2" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="488" y="300" width="14" height="10" rx="2" fill="rgba(0,0,0,0.6)"/>
  <rect x="506" y="300" width="14" height="10" rx="2" fill="#34D399"/>

  <!-- Bottom bar -->
  <rect x="40" y="350" width="500" height="28" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="56" y="368" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">580 × 400 px</text>
  <text x="290" y="368" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="middle">Custom Illustrations</text>
  <rect x="470" y="357" width="60" height="12" rx="2" fill="rgba(255,255,255,0.04)"/>
  <rect x="476" y="360" width="40" height="6" rx="2" fill="rgba(255,255,255,0.08)"/>
