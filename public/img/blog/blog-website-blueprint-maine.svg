<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0f14"/>
      <stop offset="100%" style="stop-color:#141620"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFC10;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FFFC10;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg1)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Yellow glow top-right -->
  <circle cx="1050" cy="80" r="280" fill="url(#glow1)"/>

  <!-- Left accent bar -->
  <rect x="80" y="200" width="3" height="230" fill="#FFFC10" rx="2"/>

  <!-- Category badge -->
  <rect x="80" y="160" width="108" height="28" rx="4" fill="rgba(255,252,16,0.12)"/>
  <text x="134" y="179" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#FFFC10" text-anchor="middle" letter-spacing="1.5">WEB DESIGN</text>

  <!-- Main title -->
  <text x="108" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1">The Maine Small Business</text>
  <text x="108" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1">Website Blueprint</text>

  <!-- Subtitle -->
  <text x="108" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(255,255,255,0.55)">From idea to launch — a practical guide for Maine small business owners</text>

  <!-- Divider -->
  <line x1="108" y1="426" x2="520" y2="426" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Author + date -->
  <circle cx="120" cy="462" r="16" fill="rgba(255,255,255,0.08)"/>
  <text x="120" y="467" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">IA</text>
  <text x="146" y="467" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.45)">Ivan Annikov  ·  February 2026</text>

  <!-- Right side graphic: browser window mockup -->
  <rect x="720" y="100" width="400" height="280" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Browser top bar -->
  <rect x="720" y="100" width="400" height="36" rx="8" fill="rgba(255,255,255,0.06)"/>
  <circle cx="748" cy="118" r="5" fill="rgba(255,100,100,0.5)"/>
  <circle cx="768" cy="118" r="5" fill="rgba(255,200,50,0.5)"/>
  <circle cx="788" cy="118" r="5" fill="rgba(80,200,80,0.5)"/>
  <rect x="820" y="110" width="220" height="16" rx="3" fill="rgba(255,255,255,0.06)"/>
  <!-- Content lines -->
  <rect x="748" y="156" width="160" height="10" rx="3" fill="rgba(255,252,16,0.2)"/>
  <rect x="748" y="178" width="320" height="8" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="748" y="196" width="280" height="8" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="748" y="214" width="300" height="8" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="748" y="240" width="120" height="30" rx="4" fill="rgba(255,252,16,0.15)"/>
  <rect x="880" y="240" width="100" height="30" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="748" y="296" width="320" height="6" rx="2" fill="rgba(255,255,255,0.04)"/>
  <rect x="748" y="312" width="260" height="6" rx="2" fill="rgba(255,255,255,0.04)"/>
  <rect x="748" y="328" width="290" height="6" rx="2" fill="rgba(255,255,255,0.04)"/>

  <!-- Step indicators -->
  <rect x="730" y="420" width="380" height="100" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="750" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" letter-spacing="1">STEPS TO LAUNCH</text>
  <rect x="750" y="458" width="60" height="20" rx="3" fill="rgba(255,252,16,0.15)"/>
  <rect x="820" y="458" width="60" height="20" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="890" y="458" width="60" height="20" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="960" y="458" width="60" height="20" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="1030" y="458" width="60" height="20" rx="3" fill="rgba(255,255,255,0.06)"/>
  <text x="780" y="473" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,252,16,0.8)" text-anchor="middle">Plan</text>
  <text x="850" y="473" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Design</text>
  <text x="920" y="473" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Build</text>
  <text x="990" y="473" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Launch</text>
  <text x="1060" y="473" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Grow</text>

  <!-- Branding -->
  <text x="108" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.25)" letter-spacing="2">LUMA STUDIOS</text>
  <text x="1092" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.2)" text-anchor="end">lumastudios.co</text>
</svg>
